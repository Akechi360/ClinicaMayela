name: CI/CD Deploy Clinica Mayela

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting check
        run: npm run lint || echo "Lint warnings detected but allowed to proceed"

      - name: Run unit tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "Desplegando en Vercel..."
